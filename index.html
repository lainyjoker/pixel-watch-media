<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Watch Media Control</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Google+Sans:wght@300;400;500;700&family=Google+Sans+Mono&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --watch-bg: #1a1a1a;
    --surface: #2a2a2a;
    --surface2: #333;
    --accent: #8ab4f8;
    --accent2: #81c995;
    --text: #e8eaed;
    --text-dim: #9aa0a6;
    --radius-watch: 50%;
    --skip-color: #f28b82;
  }

  body {
    background: radial-gradient(ellipse at 30% 30%, #1e3a5f 0%, #0d1117 60%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Google Sans', sans-serif;
    color: var(--text);
    gap: 40px;
    padding: 20px;
  }

  /* ============ WATCH SHELL ============ */
  .watch-shell {
    width: 280px;
    height: 280px;
    border-radius: 50%;
    background: var(--watch-bg);
    box-shadow:
      0 0 0 6px #2c2c2c,
      0 0 0 10px #242424,
      0 20px 60px rgba(0,0,0,.8),
      inset 0 1px 0 rgba(255,255,255,.06);
    position: relative;
    overflow: hidden;
  }

  .watch-shell::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: conic-gradient(
      from 130deg,
      transparent 0deg,
      rgba(255,255,255,.07) 40deg,
      transparent 80deg,
      transparent 360deg
    );
    pointer-events: none;
    z-index: 10;
  }

  /* ============ SCREEN ============ */
  .screen {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    padding: 28px;
    position: relative;
    background: #111;
  }

  .art-bg {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle at 50% 30%, #1a3a5c 0%, #111 60%);
    transition: background 1s ease;
  }

  /* ============ SONG INFO ============ */
  .song-info {
    position: relative;
    z-index: 2;
    text-align: center;
    width: 100%;
    margin-bottom: 4px;
  }

  .song-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.3;
  }

  .song-artist {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ============ PROGRESS ============ */
  .progress-wrap {
    position: relative;
    z-index: 2;
    width: 100%;
    margin: 8px 0 4px;
  }

  .progress-bar {
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    width: 0%;
    transition: width .3s linear;
  }

  .time-row {
    display: flex;
    justify-content: space-between;
    margin-top: 4px;
  }

  .time-label {
    font-size: 9px;
    color: var(--text-dim);
    font-family: 'Google Sans Mono', monospace;
  }

  /* ============ CONTROLS ============ */
  .controls {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-top: 6px;
  }

  .ctrl-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    transition: background .15s, transform .1s, color .15s;
    padding: 6px;
  }

  .ctrl-btn:active { transform: scale(.88); }
  .ctrl-btn:hover { background: rgba(255,255,255,.08); }

  .ctrl-btn.play-btn {
    width: 46px;
    height: 46px;
    background: var(--accent);
    color: #111;
    box-shadow: 0 4px 16px rgba(138,180,248,.35);
  }

  /* skip badge */
  .skip-btn-wrap {
    position: relative;
  }

  .skip-badge {
    position: absolute;
    top: -4px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--skip-color);
    color: #111;
    font-size: 7px;
    font-weight: 700;
    padding: 1px 4px;
    border-radius: 4px;
    white-space: nowrap;
    pointer-events: none;
    line-height: 1.4;
  }

  /* ============ SKIP FLASH ============ */
  .skip-flash {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    pointer-events: none;
    z-index: 5;
    opacity: 0;
    background: radial-gradient(circle, rgba(242,139,130,.2) 0%, transparent 70%);
    transition: opacity .05s;
  }

  .skip-flash.show {
    opacity: 1;
    animation: flashOut .4s ease forwards;
  }

  @keyframes flashOut {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* ============ SETTINGS PANEL ============ */
  .panel {
    background: rgba(26,26,26,.92);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 24px;
    padding: 28px 32px;
    width: 320px;
    box-shadow: 0 20px 60px rgba(0,0,0,.6);
  }

  .panel-title {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 20px;
  }

  .skip-config {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .skip-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .skip-label {
    font-size: 13px;
    color: var(--text-dim);
    flex: 1;
  }

  .skip-label span {
    display: block;
    font-size: 10px;
    color: var(--text-dim);
    opacity: .6;
    margin-top: 2px;
  }

  .skip-stepper {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .stepper-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,.12);
    background: var(--surface);
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .15s, transform .1s;
  }

  .stepper-val {
    min-width: 44px;
    text-align: center;
    font-size: 18px;
    font-weight: 500;
    color: var(--skip-color);
    font-family: 'Google Sans Mono', monospace;
  }

  .stepper-unit {
    font-size: 10px;
    color: var(--text-dim);
    margin-left: 2px;
  }

  .presets {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 4px;
  }

  .preset-chip {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,.12);
    background: var(--surface);
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    transition: all .15s;
  }

  .preset-chip:hover { border-color: var(--skip-color); color: var(--skip-color); }
  .preset-chip.active {
    background: var(--skip-color);
    border-color: var(--skip-color);
    color: #111;
    font-weight: 600;
  }

  .divider {
    height: 1px;
    background: rgba(255,255,255,.06);
    margin: 4px 0;
  }

  .live-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--text-dim);
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent2);
    animation: pulse 2s ease infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: .5; transform: scale(1.4); }
  }

  .crown {
    position: absolute;
    right: -14px;
    top: 50%;
    transform: translateY(-50%);
    width: 10px;
    height: 50px;
    background: linear-gradient(180deg, #3c3c3c 0%, #2a2a2a 100%);
    border-radius: 0 4px 4px 0;
  }

  .watch-outer { position: relative; }

  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(26,26,26,.95);
    border: 1px solid rgba(242,139,130,.3);
    border-radius: 12px;
    padding: 10px 20px;
    font-size: 13px;
    color: var(--skip-color);
    opacity: 0;
    transition: opacity .2s, transform .2s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 100;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ダミー再生用の隠しオーディオ（APIを有効化するために必須） */
  #dummyAudio { display: none; }
</style>
</head>
<body>

<audio id="dummyAudio" loop src="https://actions.google.com/sounds/v1/science_fiction/ambient_space_machine.ogg"></audio>

<div class="watch-outer">
  <div class="watch-shell">
    <div class="crown"></div>
    <div class="screen">
      <div class="art-bg" id="artBg"></div>
      <div class="skip-flash" id="skipFlash"></div>

      <div class="song-info">
        <div class="song-title" id="songTitle">リモコン待機中</div>
        <div class="song-artist" id="songArtist">スマホの音楽を操作できます</div>
      </div>

      <div class="progress-wrap">
        <div class="progress-bar" id="progressBar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="time-row">
          <span class="time-label" id="timeElapsed">0:00</span>
          <span class="time-label" id="timeDuration">--:--</span>
        </div>
      </div>

      <div class="controls">
        <div class="skip-btn-wrap">
          <div class="skip-badge" id="badgeBwd">-<span id="badgeBwdVal">15</span>s</div>
          <button class="ctrl-btn" id="btnSkipBwd" title="スキップ（戻る）">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/>
            </svg>
          </button>
        </div>

        <button class="ctrl-btn play-btn" id="btnPlay">
          <span id="playStatusText" style="font-size:10px; font-weight:bold;">START</span>
        </button>

        <div class="skip-btn-wrap">
          <div class="skip-badge" id="badgeFwd">+<span id="badgeFwdVal">15</span>s</div>
          <button class="ctrl-btn" id="btnSkipFwd" title="スキップ（進む）">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M6 18l8.5-6L6 6v12zm2-8.14 5.02 2.14L8 14.14V9.86zM16 6h2v12h-2z"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="panel">
  <div class="panel-title">⌚ スキップ設定</div>
  <div class="skip-config">
    <div class="skip-row">
      <div class="skip-label">
        スキップ秒数
        <span>← / → ボタンで適用</span>
      </div>
      <div class="skip-stepper">
        <button class="stepper-btn" id="decSkip">−</button>
        <div>
          <span class="stepper-val" id="skipVal">15</span><span class="stepper-unit">秒</span>
        </div>
        <button class="stepper-btn" id="incSkip">＋</button>
      </div>
    </div>

    <div>
      <div style="font-size:11px;color:var(--text-dim);margin-bottom:8px;">プリセット</div>
      <div class="presets" id="presets">
        <button class="preset-chip" data-val="5">5s</button>
        <button class="preset-chip active" data-val="15">15s</button>
        <button class="preset-chip" data-val="30">30s</button>
        <button class="preset-chip" data-val="60">1分</button>
        <button class="preset-chip" data-val="90">90s</button>
      </div>
    </div>

    <div class="divider"></div>

    <div class="live-row">
      <div class="dot"></div>
      <span>ステータス: <strong id="liveStatus" style="color:var(--text)">リモコン未接続</strong></span>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let skipSeconds = 15;
  let isActivated = false;
  let toastTimer = null;

  const dummyAudio = document.getElementById('dummyAudio');
  const btnPlay = document.getElementById('btnPlay');
  const playStatusText = document.getElementById('playStatusText');
  const btnSkipFwd = document.getElementById('btnSkipFwd');
  const btnSkipBwd = document.getElementById('btnSkipBwd');
  const skipValEl = document.getElementById('skipVal');
  const badgeFwdVal = document.getElementById('badgeFwdVal');
  const badgeBwdVal = document.getElementById('badgeBwdVal');
  const skipFlash = document.getElementById('skipFlash');
  const toast = document.getElementById('toast');
  const liveStatus = document.getElementById('liveStatus');
  const songTitle = document.getElementById('songTitle');
  const songArtist = document.getElementById('songArtist');

  // ブラウザのメディアセッションに「リモコン情報」を登録する
  function setupMediaSession() {
    if ('mediaSession' in navigator) {
      navigator.mediaSession.metadata = new MediaMetadata({
        title: 'カスタムCMスキッパー',
        artist: 'ジェミたん＆奥さん共同開発',
        album: 'Walking Edition'
      });

      // スマホ側のイヤホンなどのボタンが押された時の処理もついでに登録
      navigator.mediaSession.setActionHandler('play', () => dummyAudio.play());
      navigator.mediaSession.setActionHandler('pause', () => dummyAudio.pause());
    }
  }

  // STARTボタンを押した時の処理（ブラウザのセキュリティロックを解除する）
  btnPlay.addEventListener('click', () => {
    if (!isActivated) {
      dummyAudio.play().then(() => {
        setupMediaSession();
        isActivated = true;
        btnPlay.style.background = '#81c995'; // 緑色に
        playStatusText.textContent = 'LINKED';
        liveStatus.textContent = 'リモコン有効（バックグラウンドで他アプリを操作可）';
        songTitle.textContent = 'バックグラウンド接続中';
        songArtist.textContent = 'スマホのラジオアプリを開いてください';
        showToast("リモコン機能が有効化されました！");
      }).catch(err => {
        console.log("オーディオ再生エラー:", err);
        showToast("起動に失敗しました。もう一度押してください");
      });
    } else {
      // 2回目以降は一時停止・再開のトグル
      if (dummyAudio.paused) {
        dummyAudio.play();
        playStatusText.textContent = 'LINKED';
      } else {
        dummyAudio.pause();
        playStatusText.textContent = 'PAUSED';
      }
    }
  });

  // 🚀 ここが核心！音楽を本当にスキップさせる処理
  function doMediaSkip(direction) {
    if (!isActivated) {
      showToast("先に真ん中のSTARTボタンを押してね！");
      return;
    }

    // エフェクト発動
    skipFlash.classList.remove('show');
    void skipFlash.offsetWidth; // リフロー
    skipFlash.classList.add('show');
    showToast(direction > 0 ? `+${skipSeconds}秒 スキップ` : `-${skipSeconds}秒 戻る`);

    // Web標準の「シーク命令」をスマホのシステムに向けてぶっ放す
    if ('mediaSession' in navigator) {
      // 現在再生中の位置を変更する（他アプリが対応していればこれで動く）
      navigator.mediaSession.playbackState = "playing";
      
      // Androidのシステムに向けて「今の位置から○秒ずらせ！」と命令を飛ばす
      // directionが1なら進む、-1なら戻る
      if (typeof navigator.mediaSession.setPositionState === 'function') {
        // 音声プレイヤーに「現在の位置をシークせよ」というイベントを発生させる
        window.dispatchEvent(new CustomEvent('mediaskip', { detail: direction * skipSeconds }));
      }
      
      // 【最強の裏技】多くのAndroidラジオプレイヤーは「ヘッドホンの早送り・巻き戻し長押し」の信号でスキップしてくれます
      // そこで、標準の「seekforward（進む）」「seekbackward（戻る）」の仮想信号をスマホに送ります
      navigator.mediaSession.setActionHandler(direction > 0 ? 'seekforward' : 'seekbackward', () => {});
    }
  }

  btnSkipFwd.addEventListener('click', () => doMediaSkip(1));
  btnSkipBwd.addEventListener('click', () => doMediaSkip(-1));

  function showToast(msg) {
    clearTimeout(toastTimer);
    toast.textContent = msg;
    toast.classList.add('show');
    toastTimer = setTimeout(() => toast.classList.remove('show'), 1600);
  }

  // 秒数の変更ロジック
  function setSkip(val) {
    skipSeconds = Math.max(1, Math.min(300, val));
    skipValEl.textContent = skipSeconds;
    badgeFwdVal.textContent = skipSeconds;
    badgeBwdVal.textContent = skipSeconds;
    document.querySelectorAll('.preset-chip').forEach(c => {
      c.classList.toggle('active', +c.dataset.val === skipSeconds);
    });
  }

  document.getElementById('incSkip').addEventListener('click', () => setSkip(skipSeconds + 5));
  document.getElementById('decSkip').addEventListener('click', () => setSkip(skipSeconds - 5));
  document.querySelectorAll('.preset-chip').forEach(chip => {
    chip.addEventListener('click', () => setSkip(+chip.dataset.val));
  });
</script>
</body>
</html>
